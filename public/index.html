<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>안랩 FAQ 챗봇</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 500px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            display: flex;
            flex-direction: column;
            height: 600px;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
            border-radius: 12px 12px 0 0;
        }

        .header h1 {
            font-size: 20px;
            margin-bottom: 5px;
        }

        .header p {
            font-size: 12px;
            opacity: 0.9;
        }

        .auth-section {
            padding: 20px;
            border-bottom: 1px solid #eee;
            display: none;
        }

        .auth-section.show {
            display: block;
        }

        .auth-section input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            margin-bottom: 10px;
        }

        .auth-section button {
            width: 100%;
            padding: 10px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
        }

        .auth-section button:hover {
            background: #5568d3;
        }

        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message {
            display: flex;
            gap: 8px;
            margin-bottom: 8px;
        }

        .message.user {
            justify-content: flex-end;
        }

        .message-content {
            max-width: 70%;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 14px;
            line-height: 1.4;
        }

        .message.user .message-content {
            background: #667eea;
            color: white;
        }

        .message.bot .message-content {
            background: #f0f0f0;
            color: #333;
        }

        .input-section {
            padding: 15px;
            border-top: 1px solid #eee;
            display: flex;
            gap: 8px;
        }

        .input-section input {
            flex: 1;
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
        }

        .input-section button {
            padding: 10px 16px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
        }

        .input-section button:hover {
            background: #5568d3;
        }

        .loading {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: #999;
        }

        .loading span {
            display: inline-block;
            animation: blink 1.4s infinite;
        }

        .loading span:nth-child(1) { animation-delay: 0s; }
        .loading span:nth-child(2) { animation-delay: 0.2s; }
        .loading span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes blink {
            0%, 60%, 100% { opacity: 0.3; }
            30% { opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🤖 안랩 FAQ 챗봇</h1>
            <p>궁금한 점을 물어보세요</p>
      <small style="font-size: 11px; opacity: 0.8; margin-top: 10px; line-height: 1.4;">
        📋 본 가이드는 2026.9.30 정책 기준으로 작성되었습니다.<br>
        이후 업데이트된 정책이 있다면 해당 정책에 맞추어 진행 바랍니다.
    </small>
</div>

        <div class="auth-section show" id="authSection">
            <input type="password" id="authKey" placeholder="인증 키를 입력하세요" autocomplete="off">
            <button onclick="authenticate()">접속</button>
        </div>

        <div class="chat-container" id="chatContainer" style="display: none;">
        </div>

        <div class="input-section" id="inputSection" style="display: none;">
            <input type="text" id="messageInput" placeholder="질문을 입력하세요..." autocomplete="off">
            <button onclick="sendMessage()">전송</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
